<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="darkreader-lock">
	<title>You are an idiot!</title>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			font-family: 'Times New Roman', serif;
		}

		body {
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			animation: flash 666ms step-end infinite;
		}

		@keyframes flash {
			0%, 100% {
				background-color: #000000;
				color: #FFFFFF;
			}

			50% {
				background-color: #FFFFFF;
				color: #000000;
			}
		}

		.text {
			font-size: 28px;
			font-weight: bold;
			text-align: center;
			user-select: none;
			-webkit-user-select: none;
		}

		.smileys {
			font-size: 22px;
			margin-top: 8px;
			user-select: none;
			-webkit-user-select: none;
		}
	</style>
</head>
<body>
	<div class="text">You are an idiot!</div>
	<div class="smileys">☺ ☺ ☺</div>
</body>
</html>
