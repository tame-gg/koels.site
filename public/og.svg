<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="38%" cy="42%" r="60%">
      <stop offset="0%"   stop-color="#0a5a8c" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#020810" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#40c8ff"/>
      <stop offset="100%" stop-color="#00ffcc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#020810"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(64,200,255,0.05)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="rgba(64,200,255,0.1)" stroke-width="1.5"/>

  <!-- Logo mark -->
  <rect x="100" y="150" width="104" height="104" rx="26" fill="#020810" stroke="rgba(64,200,255,0.25)" stroke-width="1.5"/>
  <text x="152" y="232" font-family="Arial,'Helvetica Neue',sans-serif" font-size="76" font-weight="900" fill="url(#accent)" text-anchor="middle">K</text>

  <!-- Wordmark -->
  <text x="100" y="360" font-family="Arial,'Helvetica Neue',sans-serif" font-size="92" font-weight="800" fill="#e8f8ff" letter-spacing="-3">koels<tspan fill="url(#accent)">.site</tspan></text>

  <!-- Tagline -->
  <text x="100" y="430" font-family="Arial,'Helvetica Neue',sans-serif" font-size="32" font-weight="400" fill="rgba(200,240,255,0.55)">Apps, tools, servers &#8212; whatever sounds interesting.</text>

  <!-- Pill badges -->
  <rect x="100" y="478" width="150" height="44" rx="22" fill="rgba(64,200,255,0.1)" stroke="rgba(64,200,255,0.3)" stroke-width="1"/>
  <text x="175" y="506" font-family="'Courier New',monospace" font-size="17" fill="#40c8ff" text-anchor="middle">PROJECTS</text>

  <rect x="266" y="478" width="130" height="44" rx="22" fill="rgba(64,200,255,0.1)" stroke="rgba(64,200,255,0.3)" stroke-width="1"/>
  <text x="331" y="506" font-family="'Courier New',monospace" font-size="17" fill="#40c8ff" text-anchor="middle">SERVERS</text>

  <rect x="412" y="478" width="120" height="44" rx="22" fill="rgba(64,200,255,0.1)" stroke="rgba(64,200,255,0.3)" stroke-width="1"/>
  <text x="472" y="506" font-family="'Courier New',monospace" font-size="17" fill="#40c8ff" text-anchor="middle">TOOLS</text>

  <!-- Decorative right-side orbs -->
  <circle cx="980" cy="315" r="220" fill="rgba(64,200,255,0.05)" stroke="rgba(64,200,255,0.1)" stroke-width="1"/>
  <circle cx="980" cy="315" r="150" fill="rgba(0,255,204,0.04)" stroke="rgba(0,255,204,0.1)" stroke-width="1"/>
  <circle cx="980" cy="315" r="80" fill="rgba(64,200,255,0.07)" stroke="rgba(64,200,255,0.2)" stroke-width="1"/>
  <text x="980" y="345" font-family="Arial,'Helvetica Neue',sans-serif" font-size="80" font-weight="900" fill="url(#accent)" text-anchor="middle" opacity="0.85">K</text>
</svg>
