<style>
:root {
  --bg:#03030a;--bg2:#08080f;--surface:#0f0f1a;--surface2:#141420;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f0eeff;--muted:rgba(240,238,255,0.68);--dim:rgba(240,238,255,0.4);
  --accent:#6c5ce7;--accent2:#a29bfe;--lime:#00ff88;--red:#ff4757;
  --white:#ffffff;
  --sans:"Inter",system-ui,sans-serif;--mono:"JetBrains Mono",monospace;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;font-size:17px}
body{
  font-family:var(--sans);background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 20px;
}

/* subtle grid background */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(108,92,231,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(108,92,231,0.04) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;
}

/* glow blob */
body::after{
  content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);
  width:600px;height:400px;
  background:radial-gradient(ellipse,rgba(108,92,231,0.12) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

.container{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  display:flex;flex-direction:column;align-items:center;gap:32px;
}

/* avatar */
.avatar{
  width:80px;height:80px;border-radius:50%;
  border:1px solid var(--border2);
  background:linear-gradient(135deg,var(--surface2),var(--surface));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:1.4rem;font-weight:700;
  color:var(--accent2);letter-spacing:-0.02em;
  position:relative;overflow:hidden;
}
.avatar::before{
  content:'';position:absolute;inset:-1px;border-radius:50%;
  background:conic-gradient(from 0deg,var(--accent),transparent 30%,transparent 70%,var(--accent2));
  z-index:-1;animation:spin 6s linear infinite;
}
.avatar-inner{
  width:76px;height:76px;border-radius:50%;
  background:var(--surface);display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:1.2rem;font-weight:700;color:var(--accent2);
}

@keyframes spin{to{transform:rotate(360deg)}}

/* profile */
.profile{text-align:center;display:flex;flex-direction:column;gap:8px}
.name{
  font-family:var(--mono);font-size:1.1rem;font-weight:700;
  letter-spacing:0.05em;color:var(--white);
}
.handle{
  font-family:var(--mono);font-size:0.72rem;
  color:var(--dim);letter-spacing:0.12em;text-transform:uppercase;
}

/* links */
.links{width:100%;display:flex;flex-direction:column;gap:10px}

.link-btn{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--muted);
  font-family:var(--mono);font-size:0.78rem;
  letter-spacing:0.08em;text-transform:uppercase;
  text-decoration:none;
  transition:all 0.2s var(--ease);
  cursor:pointer;
  position:relative;overflow:hidden;
}
.link-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(108,92,231,0.06),transparent);
  transform:translateX(-100%);transition:transform 0.4s var(--ease);
}
.link-btn:hover{
  border-color:var(--border2);color:var(--white);
  background:var(--surface2);transform:translateY(-1px);
}
.link-btn:hover::before{transform:translateX(100%)}
.link-btn:active{transform:translateY(0)}

.link-icon{
  width:20px;height:20px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.link-icon svg{width:18px;height:18px;fill:currentColor}

.link-label{flex:1}
.link-arrow{
  font-size:0.65rem;color:var(--dim);
  transition:transform 0.2s var(--ease),color 0.2s;
}
.link-btn:hover .link-arrow{transform:translateX(2px);color:var(--muted)}

/* footer */
.footer{
  font-family:var(--mono);font-size:0.6rem;
  letter-spacing:0.15em;color:var(--dim);text-transform:uppercase;
  opacity:0.5;
}


/* entrance animation */
.container > *{
  opacity:0;animation:fadeUp 0.5s var(--ease) forwards;
}
.container > *:nth-child(1){animation-delay:0.05s}
.container > *:nth-child(2){animation-delay:0.12s}
.container > *:nth-child(3){animation-delay:0.2s}
.container > *:nth-child(4){animation-delay:0.4s}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* stagger link btns */
.links .link-btn{
  opacity:0;animation:fadeUp 0.4s var(--ease) forwards;
}
.links .link-btn:nth-child(1){animation-delay:0.22s}
.links .link-btn:nth-child(2){animation-delay:0.28s}
.links .link-btn:nth-child(3){animation-delay:0.34s}
.links .link-btn:nth-child(4){animation-delay:0.40s}
.links .link-btn:nth-child(5){animation-delay:0.46s}
.links .link-btn:nth-child(6){animation-delay:0.52s}
.links .link-btn:nth-child(7){animation-delay:0.58s}
</style>

  const cardDisplayname = document.getElementById('card-displayname');
  const cardUsername = document.getElementById('card-username');
  const spotifyRow = document.getElementById('spotify-row');
  const spotifySong = document.getElementById('spotify-song');
  const spotifyArtist = document.getElementById('spotify-artist');
  const spotifyBar = document.getElementById('spotify-bar');
  const spotifyElapsed = document.getElementById('spotify-elapsed');
  const spotifyDuration = document.getElementById('spotify-duration');
  let progressInterval = null;

  function fmtMs(ms){
    const s = Math.floor(ms/1000), m = Math.floor(s/60);
    return m+':'+(s%60).toString().padStart(2,'0');
  }

  function startProgress(timestamps){
    if(progressInterval) clearInterval(progressInterval);
    const start = timestamps.start, end = timestamps.end;
    const total = end - start;
    spotifyDuration.textContent = fmtMs(total);
    function tick(){
      const now = Date.now();
      const elapsed = Math.min(now - start, total);
      spotifyBar.style.width = ((elapsed/total)*100)+'%';
      spotifyElapsed.textContent = fmtMs(elapsed);
    }
    tick();
    progressInterval = setInterval(tick, 1000);
  }

  function stopProgress(){
    if(progressInterval){ clearInterval(progressInterval); progressInterval = null; }
    spotifyBar.style.width = '0%';
    spotifyElapsed.textContent = '0:00';
    spotifyDuration.textContent = '0:00';
  }
  const gameRow = document.getElementById('game-row');
  const gameName = document.getElementById('game-name');
  const activityRows = document.getElementById('activity-rows');
  const activitySpacer = document.getElementById('activity-spacer');

  function updateActivitySpacing(hasAny){
    if(hasAny){
      activityRows.style.paddingBottom = '12px';
    } else {
      activityRows.style.paddingBottom = '0';
    }
  }

  const STATUS = {
    online:  { color: '#00ff88', label: 'online' },
    idle:    { color: '#ffa500', label: 'idle' },
    dnd:     { color: '#ff4757', label: 'do not disturb' },
    offline: { color: '#747f8d', label: 'offline' },
  };

  function setAvatar(url){
    [avatarImg, cardAvatarImg].forEach(img => {
      img.src = url;
      img.style.display = 'block';
    });
    avatarFallback.style.display = 'none';
    cardAvatarFallback.style.display = 'none';
  }

  async function fetchStatus(){
    try {
      const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
      const json = await res.json();
      if(!json.success) return;
      const data = json.data;
      const s = data.discord_status || 'offline';
      const { color, label } = STATUS[s] || STATUS.offline;
      const glow = s !== 'offline' ? `0 0 6px ${color}88` : 'none';

      // card status
      cardDot.style.background = color;
      cardDot.style.boxShadow = glow;
      cardLabel.textContent = label;
      cardLabel.style.color = s !== 'offline' ? color : 'var(--dim)';

      // spotify
      let hasActivity = false;
      if(data.listening_to_spotify && data.spotify){
        spotifySong.textContent = data.spotify.song;
        spotifyArtist.textContent = data.spotify.artist;
        spotifyRow.style.display = 'block';
        if(data.spotify.timestamps) startProgress(data.spotify.timestamps);
        hasActivity = true;
      } else {
        spotifyRow.style.display = 'none';
        stopProgress();
      }

      // game activity
      const game = data.activities && data.activities.find(a => a.type === 0);
      if(game){
        gameName.textContent = game.name;
        gameRow.style.display = 'block';
        hasActivity = true;
      } else {
        gameRow.style.display = 'none';
      }

      updateActivitySpacing(hasActivity);

      // username
      const user = data.discord_user;
      if(user.global_name || user.display_name){
        cardDisplayname.textContent = user.global_name || user.display_name;
      }
      cardUsername.textContent = '@' + user.username;

      // avatar
      if(user.avatar){
        const ext = user.avatar.startsWith('a_') ? 'gif' : 'png';
        setAvatar(`https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${ext}?size=128`);
      }
    } catch(e){}
  }

  fetchStatus();
  setInterval(fetchStatus, 3000);
})();
</script>

</body>
</html>
